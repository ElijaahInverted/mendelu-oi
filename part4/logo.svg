<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      .brand-name { font-family: Georgia, 'Times New Roman', serif; font-size: 52px; font-weight: bold; font-style: italic; fill: #E8167F; }
      .brand-sub  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 400; letter-spacing: 10px; fill: #1A1A1A; }
    </style>
  </defs>

  <!-- Shopping bag outline -->
  <!-- Bag body: trapezoid (wider at top, narrower at bottom) -->
  <polygon points="130,100 370,100 340,320 160,320" fill="white" stroke="#1A1A1A" stroke-width="5" stroke-linejoin="round"/>

  <!-- Bag handles: two curved arcs -->
  <!-- Left handle -->
  <path d="M 185,100 Q 185,40 230,40 Q 275,40 275,100" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>
  <!-- Right handle -->
  <path d="M 225,100 Q 225,50 268,50 Q 310,50 310,100" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>

  <!-- Handle attachment dots -->
  <circle cx="185" cy="100" r="5" fill="#1A1A1A"/>
  <circle cx="275" cy="100" r="5" fill="#1A1A1A"/>
  <circle cx="225" cy="100" r="5" fill="#1A1A1A"/>
  <circle cx="310" cy="100" r="5" fill="#1A1A1A"/>

  <!-- Female silhouette (simplified stylised figure) -->
  <!-- Body -->
  <ellipse cx="210" cy="150" rx="18" ry="22" fill="#E8167F"/> <!-- head -->
  <!-- Hair -->
  <ellipse cx="220" cy="143" rx="14" ry="18" fill="#E8167F"/>
  <!-- Torso -->
  <path d="M 196,170 Q 190,220 188,260 L 232,260 Q 230,220 224,170 Z" fill="#E8167F"/>
  <!-- Left arm (reaching down, holding bag) -->
  <path d="M 196,185 Q 168,220 162,255" fill="none" stroke="#E8167F" stroke-width="12" stroke-linecap="round"/>
  <!-- Right arm (raised, holding small bags) -->
  <path d="M 224,180 Q 248,160 260,148" fill="none" stroke="#E8167F" stroke-width="12" stroke-linecap="round"/>
  <!-- Left leg (back, straight) -->
  <path d="M 200,258 Q 192,295 188,340" fill="none" stroke="#E8167F" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg (front, bent at knee, heel raised) -->
  <path d="M 222,258 Q 228,290 224,315 Q 222,330 215,340" fill="none" stroke="#E8167F" stroke-width="14" stroke-linecap="round"/>
  <!-- Left foot / heel -->
  <path d="M 188,340 Q 178,345 172,342" fill="none" stroke="#E8167F" stroke-width="8" stroke-linecap="round"/>
  <!-- Right foot / heel (raised) -->
  <path d="M 215,340 Q 208,348 202,346" fill="none" stroke="#E8167F" stroke-width="8" stroke-linecap="round"/>

  <!-- Small shopping bags in right hand -->
  <rect x="255" y="148" width="22" height="28" rx="2" fill="#E8167F"/>
  <path d="M 260,148 Q 260,138 266,138 Q 272,138 272,148" fill="none" stroke="#E8167F" stroke-width="3"/>
  <rect x="272" y="155" width="20" height="25" rx="2" fill="#E8167F"/>
  <path d="M 276,155 Q 276,146 282,146 Q 288,146 288,155" fill="none" stroke="#E8167F" stroke-width="3"/>

  <!-- Large shopping bag in left hand -->
  <rect x="135" y="255" width="44" height="55" rx="3" fill="#E8167F"/>
  <path d="M 143,255 Q 143,238 157,238 Q 171,238 171,255" fill="none" stroke="#E8167F" stroke-width="4"/>

  <!-- Wordmark -->
  <text x="340" y="195" class="brand-name">Indo-European</text>
  <text x="348" y="245" class="brand-sub">FUSION FASHION</text>
</svg>
